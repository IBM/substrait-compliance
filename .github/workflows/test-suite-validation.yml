name: Test Suite Validation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'test-suites/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'test-suites/**'
  workflow_dispatch:

jobs:
  validate-tpch-metadata:
    name: Validate TPC-H Metadata
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pyyaml jsonschema
      
      - name: Validate YAML syntax
        run: |
          cd test-suites/tpch
          python -c "
          import yaml
          import sys
          try:
              with open('metadata.yaml', 'r') as f:
                  data = yaml.safe_load(f)
              print('✅ YAML syntax is valid')
              print(f'📊 Test suite: {data[\"name\"]}')
              print(f'📦 Version: {data[\"version\"]}')
              print(f'🧪 Test cases: {len(data[\"testCases\"])}')
          except Exception as e:
              print(f'❌ YAML validation failed: {e}')
              sys.exit(1)
          "
      
      - name: Validate metadata schema
        run: |
          cd test-suites/tpch
          python << 'EOF'
          import yaml
          import sys
          
          with open('metadata.yaml', 'r') as f:
              data = yaml.safe_load(f)
          
          # Check required fields
          required_fields = ['name', 'version', 'description', 'testCases']
          for field in required_fields:
              if field not in data:
                  print(f'❌ Missing required field: {field}')
                  sys.exit(1)
          
          # Validate test cases
          for i, test_case in enumerate(data['testCases']):
              required_tc_fields = ['id', 'description', 'complexity', 'planBinary']
              for field in required_tc_fields:
                  if field not in test_case:
                      print(f'❌ Test case {i}: Missing required field: {field}')
                      sys.exit(1)
              
              # Validate complexity level
              valid_complexity = ['SIMPLE', 'MEDIUM', 'COMPLEX', 'VERY_COMPLEX']
              if test_case['complexity'] not in valid_complexity:
                  print(f'❌ Test case {test_case["id"]}: Invalid complexity: {test_case["complexity"]}')
                  sys.exit(1)
          
          print('✅ Metadata schema is valid')
          EOF
      
      - name: Check test case IDs are unique
        run: |
          cd test-suites/tpch
          python << 'EOF'
          import yaml
          import sys
          
          with open('metadata.yaml', 'r') as f:
              data = yaml.safe_load(f)
          
          ids = [tc['id'] for tc in data['testCases']]
          if len(ids) != len(set(ids)):
              duplicates = [id for id in ids if ids.count(id) > 1]
              print(f'❌ Duplicate test case IDs found: {set(duplicates)}')
              sys.exit(1)
          
          print(f'✅ All {len(ids)} test case IDs are unique')
          EOF

  validate-tpch-data:
    name: Validate TPC-H Data Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check data directory exists
        run: |
          if [ ! -d "test-suites/tpch/data" ]; then
            echo "❌ Data directory not found"
            exit 1
          fi
          echo "✅ Data directory exists"
      
      - name: Validate CSV files
        run: |
          cd test-suites/tpch/data
          
          # Expected CSV files
          expected_files=(
            "region.csv"
            "nation.csv"
            "supplier.csv"
            "customer.csv"
            "part.csv"
            "partsupp.csv"
            "orders.csv"
            "lineitem.csv"
          )
          
          echo "📊 Validating CSV files..."
          for file in "${expected_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing file: $file"
              exit 1
            fi
            
            # Check file is not empty
            if [ ! -s "$file" ]; then
              echo "❌ Empty file: $file"
              exit 1
            fi
            
            # Count lines
            lines=$(wc -l < "$file")
            echo "  ✅ $file: $lines lines"
          done
          
          echo "✅ All CSV files are valid"
      
      - name: Validate CSV structure
        run: |
          cd test-suites/tpch/data
          python << 'EOF'
          import csv
          import sys
          
          files_to_check = {
              'region.csv': 4,      # r_regionkey, r_name, r_comment, r_dummy
              'nation.csv': 4,      # n_nationkey, n_name, n_regionkey, n_comment
              'supplier.csv': 7,    # s_suppkey, s_name, s_address, s_nationkey, s_phone, s_acctbal, s_comment
              'customer.csv': 8,    # c_custkey, c_name, c_address, c_nationkey, c_phone, c_acctbal, c_mktsegment, c_comment
              'part.csv': 9,        # p_partkey, p_name, p_mfgr, p_brand, p_type, p_size, p_container, p_retailprice, p_comment
              'partsupp.csv': 5,    # ps_partkey, ps_suppkey, ps_availqty, ps_supplycost, ps_comment
              'orders.csv': 9,      # o_orderkey, o_custkey, o_orderstatus, o_totalprice, o_orderdate, o_orderpriority, o_clerk, o_shippriority, o_comment
              'lineitem.csv': 16    # l_orderkey, l_partkey, l_suppkey, l_linenumber, l_quantity, l_extendedprice, l_discount, l_tax, l_returnflag, l_linestatus, l_shipdate, l_commitdate, l_receiptdate, l_shipinstruct, l_shipmode, l_comment
          }
          
          for filename, expected_cols in files_to_check.items():
              with open(filename, 'r') as f:
                  reader = csv.reader(f, delimiter='|')
                  first_row = next(reader)
                  actual_cols = len(first_row)
                  
                  if actual_cols != expected_cols:
                      print(f'❌ {filename}: Expected {expected_cols} columns, found {actual_cols}')
                      sys.exit(1)
                  
                  print(f'✅ {filename}: {actual_cols} columns')
          
          print('✅ All CSV structures are valid')
          EOF
      
      - name: Calculate data statistics
        run: |
          cd test-suites/tpch/data
          echo "📊 Data Statistics:"
          for file in *.csv; do
            lines=$(wc -l < "$file")
            size=$(du -h "$file" | cut -f1)
            echo "  $file: $lines rows, $size"
          done
          
          total_size=$(du -sh . | cut -f1)
          echo "  Total: $total_size"

  validate-tpch-plans:
    name: Validate TPC-H Plans
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pyyaml
      
      - name: Check plans directory exists
        run: |
          if [ ! -d "test-suites/tpch/plans" ]; then
            echo "❌ Plans directory not found"
            exit 1
          fi
          echo "✅ Plans directory exists"
      
      - name: Validate plan files exist
        run: |
          cd test-suites/tpch
          python << 'EOF'
          import yaml
          import os
          import sys
          
          with open('metadata.yaml', 'r') as f:
              data = yaml.safe_load(f)
          
          missing_files = []
          for test_case in data['testCases']:
              # Check binary plan
              if 'planBinary' in test_case:
                  binary_path = test_case['planBinary']
                  if not os.path.exists(binary_path):
                      missing_files.append(binary_path)
                      print(f'❌ Missing binary plan: {binary_path}')
              
              # Check JSON plan if specified
              if 'planJson' in test_case:
                  json_path = test_case['planJson']
                  if not os.path.exists(json_path):
                      missing_files.append(json_path)
                      print(f'❌ Missing JSON plan: {json_path}')
          
          if missing_files:
              print(f'❌ {len(missing_files)} plan files are missing')
              sys.exit(1)
          
          print(f'✅ All plan files exist')
          EOF
      
      - name: Validate plan file formats
        run: |
          cd test-suites/tpch/plans
          
          echo "📊 Validating plan files..."
          
          # Check binary plans
          binary_count=$(ls -1 *.bin 2>/dev/null | wc -l)
          echo "  Binary plans (.bin): $binary_count"
          
          # Check JSON plans
          json_count=$(ls -1 *.json 2>/dev/null | wc -l)
          echo "  JSON plans (.json): $json_count"
          
          # Validate JSON syntax
          for json_file in *.json; do
            if [ -f "$json_file" ]; then
              if ! python -m json.tool "$json_file" > /dev/null 2>&1; then
                echo "❌ Invalid JSON: $json_file"
                exit 1
              fi
            fi
          done
          
          echo "✅ All plan files are valid"
      
      - name: Calculate plan statistics
        run: |
          cd test-suites/tpch/plans
          echo "📊 Plan Statistics:"
          
          total_size=0
          for file in *; do
            if [ -f "$file" ]; then
              size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null)
              size_kb=$((size / 1024))
              echo "  $file: ${size_kb}KB"
              total_size=$((total_size + size))
            fi
          done
          
          total_mb=$((total_size / 1024 / 1024))
          echo "  Total: ${total_mb}MB"

  generate-checksums:
    name: Generate Checksums
    runs-on: ubuntu-latest
    needs: [validate-tpch-metadata, validate-tpch-data, validate-tpch-plans]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Generate checksums for data files
        run: |
          cd test-suites/tpch/data
          sha256sum *.csv > data-checksums.txt
          echo "✅ Generated checksums for data files"
          cat data-checksums.txt
      
      - name: Generate checksums for plan files
        run: |
          cd test-suites/tpch/plans
          sha256sum * > plan-checksums.txt
          echo "✅ Generated checksums for plan files"
          head -n 5 plan-checksums.txt
      
      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: tpch-checksums
          path: |
            test-suites/tpch/data/data-checksums.txt
            test-suites/tpch/plans/plan-checksums.txt

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-tpch-metadata, validate-tpch-data, validate-tpch-plans, generate-checksums]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "## 🧪 Test Suite Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Metadata | ${{ needs.validate-tpch-metadata.result == 'success' && '✅ Valid' || '❌ Invalid' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Data Files | ${{ needs.validate-tpch-data.result == 'success' && '✅ Valid' || '❌ Invalid' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Plan Files | ${{ needs.validate-tpch-plans.result == 'success' && '✅ Valid' || '❌ Invalid' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Checksums | ${{ needs.generate-checksums.result == 'success' && '✅ Generated' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.validate-tpch-metadata.result }}" != "success" ] || \
             [ "${{ needs.validate-tpch-data.result }}" != "success" ] || \
             [ "${{ needs.validate-tpch-plans.result }}" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **Test suite validation failed. Please review the logs above.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **All test suite validations passed successfully!**" >> $GITHUB_STEP_SUMMARY
          fi

