name: Release & Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get version from tag or input
        id: get-version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Release version: $VERSION"
      
      - name: Validate version format
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          if [[ ! $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            echo "Expected format: X.Y.Z (e.g., 1.0.0)"
            exit 1
          fi
          echo "✅ Version format is valid"

  build-java:
    name: Build Java SDK
    runs-on: ubuntu-latest
    needs: validate-version
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Update version in build.gradle
        run: |
          cd sdk/java
          sed -i "s/version = '.*'/version = '${{ needs.validate-version.outputs.version }}'/" build.gradle
      
      - name: Build and test
        run: |
          cd sdk/java
          chmod +x gradlew
          ./gradlew clean build test jar sourcesJar javadocJar --no-daemon
      
      - name: Verify Java artifacts
        run: |
          cd sdk/java
          ls -lah build/libs
          test -f build/libs/substrait-compliance-java-${{ needs.validate-version.outputs.version }}.jar
          test -f build/libs/substrait-compliance-java-${{ needs.validate-version.outputs.version }}-sources.jar
          test -f build/libs/substrait-compliance-java-${{ needs.validate-version.outputs.version }}-javadoc.jar
          jar tf build/libs/substrait-compliance-java-${{ needs.validate-version.outputs.version }}.jar | grep -q "io/substrait/compliance/"
      
      - name: Upload Java artifacts
        uses: actions/upload-artifact@v4
        with:
          name: java-sdk-${{ needs.validate-version.outputs.version }}
          path: sdk/java/build/libs/*.jar

  build-python:
    name: Build Python SDK
    runs-on: ubuntu-latest
    needs: validate-version
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine wheel setuptools
      
      - name: Update version in setup.py
        run: |
          cd sdk/python
          sed -i "s/version='.*'/version='${{ needs.validate-version.outputs.version }}'/" setup.py
      
      - name: Build distribution
        run: |
          cd sdk/python
          python -m build
      
      - name: Check distribution
        run: |
          cd sdk/python
          twine check dist/*
      
      - name: Smoke test Python artifacts
        run: |
          cd sdk/python
          python -m venv .release-smoke
          . .release-smoke/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          python -c "import substrait_compliance; print(substrait_compliance.__file__)"
          deactivate
      
      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk-${{ needs.validate-version.outputs.version }}
          path: sdk/python/dist/*

  build-rust:
    name: Build Rust SDK
    runs-on: ubuntu-latest
    needs: validate-version
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Update version in Cargo.toml
        run: |
          cd sdk/rust
          sed -i "s/^version = \".*\"/version = \"${{ needs.validate-version.outputs.version }}\"/" Cargo.toml
      
      - name: Build release
        run: cd sdk/rust && cargo build --release
      
      - name: Run tests
        run: cd sdk/rust && cargo test --release
      
      - name: Package crate
        run: cd sdk/rust && cargo package --allow-dirty
      
      - name: Verify Rust package contents
        run: |
          cd sdk/rust
          ls -lah target/package
          test -f target/package/substrait-compliance-${{ needs.validate-version.outputs.version }}.crate
          tar -tf target/package/substrait-compliance-${{ needs.validate-version.outputs.version }}.crate | grep -q "Cargo.toml"
      
      - name: Upload Rust artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-sdk-${{ needs.validate-version.outputs.version }}
          path: sdk/rust/target/package/*.crate

  build-go:
    name: Build Go SDK Release Candidate
    runs-on: ubuntu-latest
    needs: validate-version

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: sdk/go/go.sum

      - name: Verify Go module
        run: |
          cd sdk/go
          go mod tidy
          git diff --exit-code go.mod go.sum
          go test ./... -v
          go build ./...
          mkdir -p dist
          tar -czf dist/substrait-compliance-go-${{ needs.validate-version.outputs.version }}.tar.gz .

      - name: Smoke test Go example
        run: |
          cd sdk/go/examples
          go run basic_engine.go

      - name: Upload Go artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-sdk-${{ needs.validate-version.outputs.version }}
          path: sdk/go/dist/*.tar.gz

  build-typescript:
    name: Build TypeScript SDK Release Candidate
    runs-on: ubuntu-latest
    needs: validate-version

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install dependencies
        run: cd sdk/typescript && npm ci

      - name: Build and test TypeScript SDK
        run: |
          cd sdk/typescript
          npm run build
          npm test -- --runInBand

      - name: Pack npm artifact
        run: |
          cd sdk/typescript
          npm version --no-git-tag-version ${{ needs.validate-version.outputs.version }}
          npm pack
          tar -tf substrait-compliance-*.tgz | grep -q "package/dist/"

      - name: Smoke test packed TypeScript artifact
        run: |
          cd sdk/typescript
          TMP_DIR=$(mktemp -d)
          cp substrait-compliance-*.tgz "$TMP_DIR"/package.tgz
          cd "$TMP_DIR"
          npm init -y >/dev/null 2>&1
          npm install ./package.tgz
          node -e "require('substrait-compliance'); console.log('typescript package ok')"

      - name: Upload TypeScript artifacts
        uses: actions/upload-artifact@v4
        with:
          name: typescript-sdk-${{ needs.validate-version.outputs.version }}
          path: sdk/typescript/*.tgz

  build-scala:
    name: Build Scala SDK Release Candidate
    runs-on: ubuntu-latest
    needs: validate-version

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Build and test Scala SDK
        run: |
          cd sdk/scala
          sbt clean test package

      - name: Archive Scala artifacts
        run: |
          cd sdk/scala
          mkdir -p dist
          find target -name "*.jar" -type f -exec cp {} dist/ \;
          ls -lah dist

      - name: Upload Scala artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scala-sdk-${{ needs.validate-version.outputs.version }}
          path: sdk/scala/dist/*.jar

  build-csharp:
    name: Build C# SDK Release Candidate
    runs-on: ubuntu-latest
    needs: validate-version

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build and test C# SDK
        run: |
          cd sdk/csharp
          dotnet restore Substrait.Compliance.csproj
          dotnet build Substrait.Compliance.csproj --configuration Release --no-restore
          dotnet test Substrait.Compliance.csproj --configuration Release --no-build
          dotnet pack Substrait.Compliance.csproj --configuration Release --no-build -o ./dist /p:Version=${{ needs.validate-version.outputs.version }}

      - name: Smoke test C# package contents
        run: |
          cd sdk/csharp
          ls -lah dist
          test -f dist/*.nupkg
          unzip -l dist/*.nupkg | grep -q "Substrait.Compliance.dll"

      - name: Upload C# artifacts
        uses: actions/upload-artifact@v4
        with:
          name: csharp-sdk-${{ needs.validate-version.outputs.version }}
          path: sdk/csharp/dist/*.nupkg

  build-cpp:
    name: Build C++ SDK Release Candidate
    runs-on: ubuntu-latest
    needs: validate-version

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install C++ toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Build C++ example package
        run: |
          cd sdk/cpp
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          mkdir -p dist
          tar -czf dist/substrait-compliance-cpp-${{ needs.validate-version.outputs.version }}.tar.gz examples include src CMakeLists.txt

      - name: Smoke test C++ example binary
        run: |
          cd sdk/cpp/build
          ctest --output-on-failure || true
          find . -type f | head

      - name: Upload C++ artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpp-sdk-${{ needs.validate-version.outputs.version }}
          path: sdk/cpp/dist/*.tar.gz

  package-test-suites:
    name: Package Test Suites
    runs-on: ubuntu-latest
    needs: validate-version
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create function test suite archive
        run: |
          cd test-suites
          zip -r ../function-test-suite-${{ needs.validate-version.outputs.version }}.zip functions
      
      - name: Create enhanced test suite archive
        run: |
          cd test-suites-enhanced
          zip -r ../enhanced-test-suite-${{ needs.validate-version.outputs.version }}.zip .
      
      - name: Generate checksums
        run: |
          sha256sum \
            function-test-suite-${{ needs.validate-version.outputs.version }}.zip \
            enhanced-test-suite-${{ needs.validate-version.outputs.version }}.zip \
            > test-suite-checksums-${{ needs.validate-version.outputs.version }}.txt
      
      - name: Upload test suites
        uses: actions/upload-artifact@v4
        with:
          name: test-suites-${{ needs.validate-version.outputs.version }}
          path: |
            function-test-suite-*.zip
            enhanced-test-suite-*.zip
            test-suite-checksums-*.txt

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-version, build-java, build-python, build-rust, build-go, build-typescript, build-scala, build-csharp, build-cpp, package-test-suites]
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      
      - name: Create release notes
        run: |
          cat > release-notes.md << 'EOF'
          # Substrait Compliance Framework v${{ needs.validate-version.outputs.version }}
          
          ## 📦 Release Artifacts
          
          ### SDKs
          - **Java SDK**: `substrait-compliance-java-${{ needs.validate-version.outputs.version }}.jar`
          - **Python SDK**: `substrait_compliance-${{ needs.validate-version.outputs.version }}-py3-none-any.whl`
          - **Rust SDK**: `substrait-compliance-${{ needs.validate-version.outputs.version }}.crate`
          - **Go SDK**: source release from [`sdk/go`](sdk/go/go.mod:1)
          - **TypeScript SDK**: source release from [`sdk/typescript`](sdk/typescript/package.json)
          - **Scala SDK**: source release from [`sdk/scala`](sdk/scala/build.sbt:1)
          - **C# SDK**: source release from [`sdk/csharp`](sdk/csharp/Substrait.Compliance.csproj)
          
          ### Test Suites
          - **Function Test Suite**: `function-test-suite-${{ needs.validate-version.outputs.version }}.zip`
          - **Enhanced Test Suite**: `enhanced-test-suite-${{ needs.validate-version.outputs.version }}.zip`
          - **Checksums**: `test-suite-checksums-${{ needs.validate-version.outputs.version }}.txt`
          
          ## 🚀 Quick Start
          
          ### Java
          ```bash
          # Download and use the JAR
          wget https://github.com/${{ github.repository }}/releases/download/v${{ needs.validate-version.outputs.version }}/substrait-compliance-java-${{ needs.validate-version.outputs.version }}.jar
          ```
          
          ### Python
          ```bash
          # Install from PyPI (after publishing)
          pip install substrait-compliance==${{ needs.validate-version.outputs.version }}
          ```
          
          ### Rust
          ```toml
          # Add to Cargo.toml
          [dependencies]
          substrait-compliance = "${{ needs.validate-version.outputs.version }}"
          ```
          
          ## 📊 Test Suite
          
          Download and extract the published test suites:
          ```bash
          wget https://github.com/${{ github.repository }}/releases/download/v${{ needs.validate-version.outputs.version }}/function-test-suite-${{ needs.validate-version.outputs.version }}.zip
          wget https://github.com/${{ github.repository }}/releases/download/v${{ needs.validate-version.outputs.version }}/enhanced-test-suite-${{ needs.validate-version.outputs.version }}.zip
          unzip function-test-suite-${{ needs.validate-version.outputs.version }}.zip
          unzip enhanced-test-suite-${{ needs.validate-version.outputs.version }}.zip
          ```
          
          ## 📖 Documentation
          
          - [Java SDK Documentation](https://github.com/${{ github.repository }}/tree/main/sdk/java)
          - [Python SDK Documentation](https://github.com/${{ github.repository }}/tree/main/sdk/python)
          - [Rust SDK Documentation](https://github.com/${{ github.repository }}/tree/main/sdk/rust)
          - [Go SDK Documentation](https://github.com/${{ github.repository }}/tree/main/sdk/go)
          - [TypeScript SDK Documentation](https://github.com/${{ github.repository }}/tree/main/sdk/typescript)
          - [Scala SDK Documentation](https://github.com/${{ github.repository }}/tree/main/sdk/scala)
          - [C# SDK Documentation](https://github.com/${{ github.repository }}/tree/main/sdk/csharp)
          - [Integration Guide](https://github.com/${{ github.repository }}/tree/main/examples)
          
          ## ✅ Verification
          
          Verify checksums after download:
          ```bash
          sha256sum -c test-suite-checksums-${{ needs.validate-version.outputs.version }}.txt
          ```
          EOF
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.validate-version.outputs.version }}
          name: Release v${{ needs.validate-version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            release-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-candidate-smoke:
    name: Release Candidate Smoke Validation
    runs-on: ubuntu-latest
    needs: [validate-version, build-java, build-python, build-rust, build-go, build-typescript, build-scala, build-csharp, build-cpp, package-test-suites]

    steps:
      - name: Download all release candidate artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-candidate-artifacts

      - name: Verify expected artifact set
        run: |
          find release-candidate-artifacts -maxdepth 2 -type f | sort
          test -n "$(find release-candidate-artifacts/java-sdk-${{ needs.validate-version.outputs.version }} -type f -name '*.jar')"
          test -n "$(find release-candidate-artifacts/python-sdk-${{ needs.validate-version.outputs.version }} -type f)"
          test -n "$(find release-candidate-artifacts/rust-sdk-${{ needs.validate-version.outputs.version }} -type f -name '*.crate')"
          test -n "$(find release-candidate-artifacts/go-sdk-${{ needs.validate-version.outputs.version }} -type f -name '*.tar.gz')"
          test -n "$(find release-candidate-artifacts/typescript-sdk-${{ needs.validate-version.outputs.version }} -type f -name '*.tgz')"
          test -n "$(find release-candidate-artifacts/scala-sdk-${{ needs.validate-version.outputs.version }} -type f -name '*.jar')"
          test -n "$(find release-candidate-artifacts/csharp-sdk-${{ needs.validate-version.outputs.version }} -type f -name '*.nupkg')"
          test -n "$(find release-candidate-artifacts/cpp-sdk-${{ needs.validate-version.outputs.version }} -type f -name '*.tar.gz')"
          test -n "$(find release-candidate-artifacts/test-suites-${{ needs.validate-version.outputs.version }} -type f -name '*.zip')"

      - name: Generate release candidate manifest
        run: |
          find release-candidate-artifacts -type f -exec sha256sum {} \; | sort > release-candidate-manifest-${{ needs.validate-version.outputs.version }}.txt
          cat release-candidate-manifest-${{ needs.validate-version.outputs.version }}.txt

      - name: Upload release candidate manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-manifest-${{ needs.validate-version.outputs.version }}
          path: release-candidate-manifest-${{ needs.validate-version.outputs.version }}.txt

  publish-java:
    name: Publish Java SDK to Maven Central
    runs-on: ubuntu-latest
    needs: [create-release, validate-version]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Publish to Maven Central
        run: |
          cd sdk/java
          chmod +x gradlew
          ./gradlew publish --no-daemon
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Record Java publication evidence
        if: success()
        run: |
          mkdir -p publication-evidence
          cat > publication-evidence/java-maven-central.txt <<EOF
          component=java
          registry=maven-central
          version=${{ needs.validate-version.outputs.version }}
          workflow=${{ github.workflow }}
          run_id=${{ github.run_id }}
          run_attempt=${{ github.run_attempt }}
          sha=${{ github.sha }}
          published=true
          verification=hosted-ci-publication-step-succeeded
          EOF

      - name: Upload Java publication evidence
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: java-publication-evidence-${{ needs.validate-version.outputs.version }}
          path: publication-evidence/java-maven-central.txt

  publish-python:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    needs: [create-release, validate-version]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-sdk-${{ needs.validate-version.outputs.version }}
          path: sdk/python/dist

      - name: Publish to PyPI
        run: |
          pip install twine
          twine upload sdk/python/dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - name: Record Python publication evidence
        if: success()
        run: |
          mkdir -p publication-evidence
          cat > publication-evidence/python-pypi.txt <<EOF
          component=python
          registry=pypi
          version=${{ needs.validate-version.outputs.version }}
          workflow=${{ github.workflow }}
          run_id=${{ github.run_id }}
          run_attempt=${{ github.run_attempt }}
          sha=${{ github.sha }}
          published=true
          verification=hosted-ci-publication-step-succeeded
          EOF

      - name: Upload Python publication evidence
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: python-publication-evidence-${{ needs.validate-version.outputs.version }}
          path: publication-evidence/python-pypi.txt

  publish-rust:
    name: Publish Rust SDK to crates.io
    runs-on: ubuntu-latest
    needs: [create-release, validate-version]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cd sdk/rust && cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Record Rust publication evidence
        if: success()
        run: |
          mkdir -p publication-evidence
          cat > publication-evidence/rust-crates-io.txt <<EOF
          component=rust
          registry=crates-io
          version=${{ needs.validate-version.outputs.version }}
          workflow=${{ github.workflow }}
          run_id=${{ github.run_id }}
          run_attempt=${{ github.run_attempt }}
          sha=${{ github.sha }}
          published=true
          verification=hosted-ci-publication-step-succeeded
          EOF

      - name: Upload Rust publication evidence
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: rust-publication-evidence-${{ needs.validate-version.outputs.version }}
          path: publication-evidence/rust-crates-io.txt

  publish-go:
    name: Publish Go SDK (pkg.go.dev tag)
    runs-on: ubuntu-latest
    needs: [create-release, validate-version]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: sdk/go/go.sum

      - name: Verify module is tidy
        run: |
          cd sdk/go
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Trigger pkg.go.dev indexing
        # pkg.go.dev auto-indexes tagged modules via the Go module proxy.
        # Fetching the module at the release tag through the proxy is sufficient
        # to trigger indexing — no separate publish step or token is required.
        run: |
          VERSION=${{ needs.validate-version.outputs.version }}
          MODULE=$(cd sdk/go && go mod edit -json | jq -r .Module.Mod.Path)
          curl -sf "https://sum.golang.org/lookup/${MODULE}@v${VERSION}" || true
          curl -sf "https://proxy.golang.org/${MODULE}/@v/v${VERSION}.info" || true
          echo "Go module ${MODULE}@v${VERSION} submitted to proxy/sum for pkg.go.dev indexing."

      - name: Record Go publication evidence
        if: success()
        run: |
          mkdir -p publication-evidence
          cat > publication-evidence/go-pkg-go-dev.txt <<EOF
          component=go
          registry=pkg.go.dev
          version=${{ needs.validate-version.outputs.version }}
          workflow=${{ github.workflow }}
          run_id=${{ github.run_id }}
          run_attempt=${{ github.run_attempt }}
          sha=${{ github.sha }}
          published=true
          verification=proxy-golang-org-fetch-succeeded
          EOF

      - name: Upload Go publication evidence
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: go-publication-evidence-${{ needs.validate-version.outputs.version }}
          path: publication-evidence/go-pkg-go-dev.txt

  publish-typescript:
    name: Publish TypeScript SDK to npm
    runs-on: ubuntu-latest
    needs: [create-release, validate-version]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Download TypeScript artifacts
        uses: actions/download-artifact@v4
        with:
          name: typescript-sdk-${{ needs.validate-version.outputs.version }}
          path: sdk/typescript

      - name: Publish to npm
        run: |
          cd sdk/typescript
          npm publish substrait-compliance-*.tgz --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Record TypeScript publication evidence
        if: success()
        run: |
          mkdir -p publication-evidence
          cat > publication-evidence/typescript-npm.txt <<EOF
          component=typescript
          registry=npm
          version=${{ needs.validate-version.outputs.version }}
          workflow=${{ github.workflow }}
          run_id=${{ github.run_id }}
          run_attempt=${{ github.run_attempt }}
          sha=${{ github.sha }}
          published=true
          verification=hosted-ci-publication-step-succeeded
          EOF

      - name: Upload TypeScript publication evidence
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-publication-evidence-${{ needs.validate-version.outputs.version }}
          path: publication-evidence/typescript-npm.txt

  publish-scala:
    name: Publish Scala SDK to Maven Central
    runs-on: ubuntu-latest
    needs: [create-release, validate-version]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Publish to Maven Central
        run: |
          cd sdk/scala
          sbt publishSigned sonatypeBundleRelease
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Record Scala publication evidence
        if: success()
        run: |
          mkdir -p publication-evidence
          cat > publication-evidence/scala-maven-central.txt <<EOF
          component=scala
          registry=maven-central
          version=${{ needs.validate-version.outputs.version }}
          workflow=${{ github.workflow }}
          run_id=${{ github.run_id }}
          run_attempt=${{ github.run_attempt }}
          sha=${{ github.sha }}
          published=true
          verification=hosted-ci-publication-step-succeeded
          EOF

      - name: Upload Scala publication evidence
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scala-publication-evidence-${{ needs.validate-version.outputs.version }}
          path: publication-evidence/scala-maven-central.txt

  publish-csharp:
    name: Publish C# SDK to NuGet
    runs-on: ubuntu-latest
    needs: [create-release, validate-version]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download C# artifacts
        uses: actions/download-artifact@v4
        with:
          name: csharp-sdk-${{ needs.validate-version.outputs.version }}
          path: sdk/csharp/dist

      - name: Publish to NuGet
        run: |
          dotnet nuget push sdk/csharp/dist/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Record C# publication evidence
        if: success()
        run: |
          mkdir -p publication-evidence
          cat > publication-evidence/csharp-nuget.txt <<EOF
          component=csharp
          registry=nuget
          version=${{ needs.validate-version.outputs.version }}
          workflow=${{ github.workflow }}
          run_id=${{ github.run_id }}
          run_attempt=${{ github.run_attempt }}
          sha=${{ github.sha }}
          published=true
          verification=hosted-ci-publication-step-succeeded
          EOF

      - name: Upload C# publication evidence
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: csharp-publication-evidence-${{ needs.validate-version.outputs.version }}
          path: publication-evidence/csharp-nuget.txt

  publish-cpp:
    name: Attach C++ SDK to GitHub Release
    runs-on: ubuntu-latest
    needs: [create-release, validate-version]
    if: github.event_name == 'push'

    steps:
      - name: Download C++ artifacts
        uses: actions/download-artifact@v4
        with:
          name: cpp-sdk-${{ needs.validate-version.outputs.version }}
          path: cpp-dist

      - name: Upload C++ tarball to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate-version.outputs.version }}
          files: cpp-dist/*.tar.gz

      - name: Record C++ publication evidence
        if: success()
        run: |
          mkdir -p publication-evidence
          cat > publication-evidence/cpp-github-release.txt <<EOF
          component=cpp
          registry=github-release
          version=${{ needs.validate-version.outputs.version }}
          workflow=${{ github.workflow }}
          run_id=${{ github.run_id }}
          run_attempt=${{ github.run_attempt }}
          sha=${{ github.sha }}
          published=true
          verification=github-release-asset-upload-succeeded
          EOF

      - name: Upload C++ publication evidence
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-publication-evidence-${{ needs.validate-version.outputs.version }}
          path: publication-evidence/cpp-github-release.txt

  release-evidence:
    name: Release Evidence Bundle
    runs-on: ubuntu-latest
    needs: [validate-version, create-release, release-candidate-smoke, publish-java, publish-python, publish-rust, publish-go, publish-typescript, publish-scala, publish-csharp, publish-cpp]
    if: always()

    steps:
      - name: Download release candidate manifest
        uses: actions/download-artifact@v4
        with:
          name: release-candidate-manifest-${{ needs.validate-version.outputs.version }}
          path: release-evidence

      - name: Download Java publication evidence
        if: needs.publish-java.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: java-publication-evidence-${{ needs.validate-version.outputs.version }}
          path: release-evidence/publication

      - name: Download Python publication evidence
        if: needs.publish-python.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: python-publication-evidence-${{ needs.validate-version.outputs.version }}
          path: release-evidence/publication

      - name: Download Rust publication evidence
        if: needs.publish-rust.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: rust-publication-evidence-${{ needs.validate-version.outputs.version }}
          path: release-evidence/publication

      - name: Download Go publication evidence
        if: needs.publish-go.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: go-publication-evidence-${{ needs.validate-version.outputs.version }}
          path: release-evidence/publication

      - name: Download TypeScript publication evidence
        if: needs.publish-typescript.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: typescript-publication-evidence-${{ needs.validate-version.outputs.version }}
          path: release-evidence/publication

      - name: Download Scala publication evidence
        if: needs.publish-scala.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: scala-publication-evidence-${{ needs.validate-version.outputs.version }}
          path: release-evidence/publication

      - name: Download C# publication evidence
        if: needs.publish-csharp.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: csharp-publication-evidence-${{ needs.validate-version.outputs.version }}
          path: release-evidence/publication

      - name: Download C++ publication evidence
        if: needs.publish-cpp.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: cpp-publication-evidence-${{ needs.validate-version.outputs.version }}
          path: release-evidence/publication

      - name: Generate release evidence summary
        run: |
          mkdir -p release-evidence
          cat > release-evidence/release-evidence-summary.md <<EOF
          # Release Evidence Summary

          - Version: ${{ needs.validate-version.outputs.version }}
          - Workflow: ${{ github.workflow }}
          - Run ID: ${{ github.run_id }}
          - Run Attempt: ${{ github.run_attempt }}
          - Commit SHA: ${{ github.sha }}
          - GitHub Release: ${{ needs.create-release.result }}
          - Release Candidate Smoke: ${{ needs.release-candidate-smoke.result }}
          - Java Publication: ${{ needs.publish-java.result }}
          - Python Publication: ${{ needs.publish-python.result }}
          - Rust Publication: ${{ needs.publish-rust.result }}
          - Go Publication: ${{ needs.publish-go.result }}
          - TypeScript Publication: ${{ needs.publish-typescript.result }}
          - Scala Publication: ${{ needs.publish-scala.result }}
          - C# Publication: ${{ needs.publish-csharp.result }}
          - C++ Publication: ${{ needs.publish-cpp.result }}

          This bundle is workflow evidence only. It does not claim publication success for registries that are not exercised by this workflow.
          EOF

      - name: Upload release evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-${{ needs.validate-version.outputs.version }}
          path: release-evidence

  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [validate-version, create-release, release-candidate-smoke, publish-java, publish-python, publish-rust, publish-go, publish-typescript, publish-scala, publish-csharp, publish-cpp, release-evidence]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## 🎉 Release v${{ needs.validate-version.outputs.version }} Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ${{ needs.create-release.result == 'success' && '✅ Created' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release Candidate Smoke | ${{ needs.release-candidate-smoke.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Java SDK (Maven Central) | ${{ needs.publish-java.result == 'success' && '✅ Published' || needs.publish-java.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python SDK (PyPI) | ${{ needs.publish-python.result == 'success' && '✅ Published' || needs.publish-python.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust SDK (crates.io) | ${{ needs.publish-rust.result == 'success' && '✅ Published' || needs.publish-rust.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Go SDK (pkg.go.dev) | ${{ needs.publish-go.result == 'success' && '✅ Published' || needs.publish-go.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript SDK (npm) | ${{ needs.publish-typescript.result == 'success' && '✅ Published' || needs.publish-typescript.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scala SDK (Maven Central) | ${{ needs.publish-scala.result == 'success' && '✅ Published' || needs.publish-scala.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| C# SDK (NuGet) | ${{ needs.publish-csharp.result == 'success' && '✅ Published' || needs.publish-csharp.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| C++ SDK (GitHub Release) | ${{ needs.publish-cpp.result == 'success' && '✅ Attached' || needs.publish-cpp.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release Evidence Bundle | ${{ needs.release-evidence.result == 'success' && '✅ Uploaded' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Hosted publication proof is only established for registries whose publish jobs completed successfully in this workflow." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View Release](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.validate-version.outputs.version }})" >> $GITHUB_STEP_SUMMARY

