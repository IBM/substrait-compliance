name: Release & Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get version from tag or input
        id: get-version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Release version: $VERSION"
      
      - name: Validate version format
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          if [[ ! $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            echo "Expected format: X.Y.Z (e.g., 1.0.0)"
            exit 1
          fi
          echo "✅ Version format is valid"

  build-java:
    name: Build Java SDK
    runs-on: ubuntu-latest
    needs: validate-version
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Update version in build.gradle
        run: |
          cd sdk/java
          sed -i "s/version = '.*'/version = '${{ needs.validate-version.outputs.version }}'/" build.gradle
      
      - name: Build and test
        run: |
          cd sdk/java
          chmod +x gradlew
          ./gradlew clean build test --no-daemon
      
      - name: Generate JAR
        run: cd sdk/java && ./gradlew jar --no-daemon
      
      - name: Upload Java artifacts
        uses: actions/upload-artifact@v4
        with:
          name: java-sdk-${{ needs.validate-version.outputs.version }}
          path: sdk/java/build/libs/*.jar

  build-python:
    name: Build Python SDK
    runs-on: ubuntu-latest
    needs: validate-version
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine wheel setuptools
      
      - name: Update version in setup.py
        run: |
          cd sdk/python
          sed -i "s/version='.*'/version='${{ needs.validate-version.outputs.version }}'/" setup.py
      
      - name: Build distribution
        run: |
          cd sdk/python
          python -m build
      
      - name: Check distribution
        run: |
          cd sdk/python
          twine check dist/*
      
      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk-${{ needs.validate-version.outputs.version }}
          path: sdk/python/dist/*

  build-rust:
    name: Build Rust SDK
    runs-on: ubuntu-latest
    needs: validate-version
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      
      - name: Update version in Cargo.toml
        run: |
          cd sdk/rust
          sed -i "s/^version = \".*\"/version = \"${{ needs.validate-version.outputs.version }}\"/" Cargo.toml
      
      - name: Build release
        run: cd sdk/rust && cargo build --release
      
      - name: Run tests
        run: cd sdk/rust && cargo test --release
      
      - name: Package crate
        run: cd sdk/rust && cargo package --allow-dirty
      
      - name: Upload Rust artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-sdk-${{ needs.validate-version.outputs.version }}
          path: sdk/rust/target/package/*.crate

  package-test-suites:
    name: Package Test Suites
    runs-on: ubuntu-latest
    needs: validate-version
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create function test suite archive
        run: |
          cd test-suites
          zip -r ../function-test-suite-${{ needs.validate-version.outputs.version }}.zip functions
      
      - name: Create enhanced test suite archive
        run: |
          cd test-suites-enhanced
          zip -r ../enhanced-test-suite-${{ needs.validate-version.outputs.version }}.zip .
      
      - name: Generate checksums
        run: |
          sha256sum \
            function-test-suite-${{ needs.validate-version.outputs.version }}.zip \
            enhanced-test-suite-${{ needs.validate-version.outputs.version }}.zip \
            > test-suite-checksums-${{ needs.validate-version.outputs.version }}.txt
      
      - name: Upload test suites
        uses: actions/upload-artifact@v4
        with:
          name: test-suites-${{ needs.validate-version.outputs.version }}
          path: |
            function-test-suite-*.zip
            enhanced-test-suite-*.zip
            test-suite-checksums-*.txt

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-version, build-java, build-python, build-rust, package-test-suites]
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      
      - name: Create release notes
        run: |
          cat > release-notes.md << 'EOF'
          # Substrait Compliance Framework v${{ needs.validate-version.outputs.version }}
          
          ## 📦 Release Artifacts
          
          ### SDKs
          - **Java SDK**: `substrait-compliance-java-${{ needs.validate-version.outputs.version }}.jar`
          - **Python SDK**: `substrait_compliance-${{ needs.validate-version.outputs.version }}-py3-none-any.whl`
          - **Rust SDK**: `substrait-compliance-${{ needs.validate-version.outputs.version }}.crate`
          - **Go SDK**: source release from [`sdk/go`](sdk/go/go.mod:1)
          - **TypeScript SDK**: source release from [`sdk/typescript`](sdk/typescript/package.json)
          - **Scala SDK**: source release from [`sdk/scala`](sdk/scala/build.sbt:1)
          - **C# SDK**: source release from [`sdk/csharp`](sdk/csharp/Substrait.Compliance.csproj)
          
          ### Test Suites
          - **Function Test Suite**: `function-test-suite-${{ needs.validate-version.outputs.version }}.zip`
          - **Enhanced Test Suite**: `enhanced-test-suite-${{ needs.validate-version.outputs.version }}.zip`
          - **Checksums**: `test-suite-checksums-${{ needs.validate-version.outputs.version }}.txt`
          
          ## 🚀 Quick Start
          
          ### Java
          ```bash
          # Download and use the JAR
          wget https://github.com/${{ github.repository }}/releases/download/v${{ needs.validate-version.outputs.version }}/substrait-compliance-java-${{ needs.validate-version.outputs.version }}.jar
          ```
          
          ### Python
          ```bash
          # Install from PyPI (after publishing)
          pip install substrait-compliance==${{ needs.validate-version.outputs.version }}
          ```
          
          ### Rust
          ```toml
          # Add to Cargo.toml
          [dependencies]
          substrait-compliance = "${{ needs.validate-version.outputs.version }}"
          ```
          
          ## 📊 Test Suite
          
          Download and extract the published test suites:
          ```bash
          wget https://github.com/${{ github.repository }}/releases/download/v${{ needs.validate-version.outputs.version }}/function-test-suite-${{ needs.validate-version.outputs.version }}.zip
          wget https://github.com/${{ github.repository }}/releases/download/v${{ needs.validate-version.outputs.version }}/enhanced-test-suite-${{ needs.validate-version.outputs.version }}.zip
          unzip function-test-suite-${{ needs.validate-version.outputs.version }}.zip
          unzip enhanced-test-suite-${{ needs.validate-version.outputs.version }}.zip
          ```
          
          ## 📖 Documentation
          
          - [Java SDK Documentation](https://github.com/${{ github.repository }}/tree/main/sdk/java)
          - [Python SDK Documentation](https://github.com/${{ github.repository }}/tree/main/sdk/python)
          - [Rust SDK Documentation](https://github.com/${{ github.repository }}/tree/main/sdk/rust)
          - [Go SDK Documentation](https://github.com/${{ github.repository }}/tree/main/sdk/go)
          - [TypeScript SDK Documentation](https://github.com/${{ github.repository }}/tree/main/sdk/typescript)
          - [Scala SDK Documentation](https://github.com/${{ github.repository }}/tree/main/sdk/scala)
          - [C# SDK Documentation](https://github.com/${{ github.repository }}/tree/main/sdk/csharp)
          - [Integration Guide](https://github.com/${{ github.repository }}/tree/main/examples)
          
          ## ✅ Verification
          
          Verify checksums after download:
          ```bash
          sha256sum -c test-suite-checksums-${{ needs.validate-version.outputs.version }}.txt
          ```
          EOF
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.validate-version.outputs.version }}
          name: Release v${{ needs.validate-version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            release-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-java:
    name: Publish Java SDK to Maven Central
    runs-on: ubuntu-latest
    needs: [create-release, validate-version]
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Publish to Maven Central
        run: |
          cd sdk/java
          chmod +x gradlew
          ./gradlew publish --no-daemon
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

  publish-python:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    needs: [create-release, validate-version]
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-sdk-${{ needs.validate-version.outputs.version }}
          path: sdk/python/dist
      
      - name: Publish to PyPI
        run: |
          pip install twine
          twine upload sdk/python/dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  publish-rust:
    name: Publish Rust SDK to crates.io
    runs-on: ubuntu-latest
    needs: [create-release, validate-version]
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      
      - name: Publish to crates.io
        run: cd sdk/rust && cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [create-release, publish-java, publish-python, publish-rust]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "## 🎉 Release v${{ needs.validate-version.outputs.version }} Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ${{ needs.create-release.result == 'success' && '✅ Created' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Java SDK (Maven) | ${{ needs.publish-java.result == 'success' && '✅ Published' || needs.publish-java.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python SDK (PyPI) | ${{ needs.publish-python.result == 'success' && '✅ Published' || needs.publish-python.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust SDK (crates.io) | ${{ needs.publish-rust.result == 'success' && '✅ Published' || needs.publish-rust.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View Release](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.validate-version.outputs.version }})" >> $GITHUB_STEP_SUMMARY

