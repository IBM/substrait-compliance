name: API PR Validation

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'api/**'
      - 'sdk/java/**'
      - '.github/workflows/api-pr-validation.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission
        run: chmod +x api/gradlew
      
      - name: Run tests
        run: |
          cd api
          ./gradlew test --no-daemon
      
      - name: Generate coverage report
        run: |
          cd api
          ./gradlew jacocoTestReport --no-daemon
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./api/build/reports/jacoco/test/jacocoTestReport.xml
          flags: api
          name: api-coverage
          fail_ci_if_error: false
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: api/build/test-results/
      
      - name: Comment PR with results
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const testResults = 'Tests completed';
            const coverage = 'Coverage report generated';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 Test Results\n\n✅ ${testResults}\n📊 ${coverage}\n\nView full results in the Actions tab.`
            })

