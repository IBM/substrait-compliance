name: Deploy API to Staging

on:
  workflow_run:
    workflows: ["API Container Build"]
    types: [completed]
    branches: [develop]
  workflow_dispatch:

env:
  DEPLOYMENT_NAME: substrait-api
  NAMESPACE: substrait-staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    environment:
      name: staging
      url: https://api-staging.substrait.io
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'
      
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      
      - name: Verify cluster connection
        run: |
          kubectl cluster-info
          kubectl get nodes
      
      - name: Update deployment image
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
            api=ghcr.io/${{ github.repository }}/substrait-compliance-api:develop \
            -n ${{ env.NAMESPACE }}
      
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.NAMESPACE }} \
            --timeout=5m
      
      - name: Get deployment status
        run: |
          kubectl get deployment ${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }}
          kubectl get pods -n ${{ env.NAMESPACE }} -l app=substrait-api
      
      - name: Run smoke tests
        run: |
          ENDPOINT="https://api-staging.substrait.io"
          
          echo "Testing health endpoint..."
          curl -f $ENDPOINT/actuator/health || exit 1
          
          echo "Testing API endpoint..."
          curl -f $ENDPOINT/swagger-ui.html || exit 1
          
          echo "✅ All smoke tests passed"
      
      - name: Notify on success
        if: success()
        run: |
          echo "🚀 Successfully deployed to staging"
          echo "URL: https://api-staging.substrait.io"
          echo "Commit: ${{ github.sha }}"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment to staging failed"
          echo "Check logs for details"

