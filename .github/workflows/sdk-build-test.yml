name: SDK Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  java-sdk:
    name: Java SDK Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x sdk/java/gradlew
      
      - name: Build Java SDK
        run: cd sdk/java && ./gradlew build --no-daemon
      
      - name: Run Java SDK tests
        run: cd sdk/java && ./gradlew test --no-daemon
      
      - name: Generate test report
        if: always()
        run: cd sdk/java && ./gradlew jacocoTestReport --no-daemon
      
      - name: Upload Java test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-results
          path: sdk/java/build/reports/tests/test/
      
      - name: Upload Java coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-coverage-report
          path: sdk/java/build/reports/jacoco/test/
      
      - name: Check test results
        run: |
          cd sdk/java
          if [ -f build/test-results/test/TEST-*.xml ]; then
            echo "✅ Java SDK tests completed"
          else
            echo "❌ Java SDK tests failed"
            exit 1
          fi

  python-sdk:
    name: Python SDK Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd sdk/python
          python -m pip install --upgrade pip
          pip install -e .[dev]
      
      - name: Run Python SDK tests
        run: |
          cd sdk/python
          pytest tests/ -v --cov=substrait_compliance --cov-report=xml --cov-report=html
      
      - name: Upload Python test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results-${{ matrix.python-version }}
          path: sdk/python/htmlcov/
      
      - name: Upload Python coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-${{ matrix.python-version }}
          path: sdk/python/coverage.xml
      
      - name: Check test results
        run: |
          cd sdk/python
          echo "✅ Python SDK tests completed for Python ${{ matrix.python-version }}"

  rust-sdk:
    name: Rust SDK Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: rustfmt, clippy
      
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            sdk/rust/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Check Rust formatting
        run: cd sdk/rust && cargo fmt -- --check
      
      - name: Run Clippy
        run: cd sdk/rust && cargo clippy -- -D warnings
      
      - name: Build Rust SDK
        run: cd sdk/rust && cargo build --release
      
      - name: Run Rust SDK tests
        run: cd sdk/rust && cargo test --release
      
      - name: Generate coverage report
        run: |
          cd sdk/rust
          cargo install cargo-tarpaulin || true
          cargo tarpaulin --out Xml --output-dir coverage
      
      - name: Upload Rust test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-test-results
          path: sdk/rust/target/release/
      
      - name: Upload Rust coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-report
          path: sdk/rust/coverage/
      
      - name: Check test results
        run: echo "✅ Rust SDK tests completed"

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [java-sdk, python-sdk, rust-sdk]
    if: always()
    
    steps:
      - name: Check all SDK tests
        run: |
          echo "## SDK Build & Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| SDK | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Java | ${{ needs.java-sdk.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python | ${{ needs.python-sdk.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust | ${{ needs.rust-sdk.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.java-sdk.result }}" != "success" ] || \
             [ "${{ needs.python-sdk.result }}" != "success" ] || \
             [ "${{ needs.rust-sdk.result }}" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **Some SDK tests failed. Please review the logs above.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **All SDK tests passed successfully!**" >> $GITHUB_STEP_SUMMARY
          fi

