name: SDK Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  java-sdk:
    name: Java SDK Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x sdk/java/gradlew
      
      - name: Build Java SDK
        run: cd sdk/java && ./gradlew build --no-daemon
      
      - name: Run Java SDK tests
        run: cd sdk/java && ./gradlew test --no-daemon
      
      - name: Generate test report
        if: always()
        run: cd sdk/java && ./gradlew jacocoTestReport --no-daemon
      
      - name: Upload Java test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-results
          path: sdk/java/build/reports/tests/test/
      
      - name: Upload Java coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-coverage-report
          path: sdk/java/build/reports/jacoco/test/
      
      - name: Check test results
        run: |
          cd sdk/java
          if [ -f build/test-results/test/TEST-*.xml ]; then
            echo "✅ Java SDK tests completed"
          else
            echo "❌ Java SDK tests failed"
            exit 1
          fi

  python-sdk:
    name: Python SDK Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd sdk/python
          python -m pip install --upgrade pip
          pip install -e .[dev]
      
      - name: Run Python SDK tests
        run: |
          cd sdk/python
          pytest tests/ -v --cov=substrait_compliance --cov-report=xml --cov-report=html
      
      - name: Upload Python test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results-${{ matrix.python-version }}
          path: sdk/python/htmlcov/
      
      - name: Upload Python coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-${{ matrix.python-version }}
          path: sdk/python/coverage.xml
      
      - name: Check test results
        run: |
          cd sdk/python
          echo "✅ Python SDK tests completed for Python ${{ matrix.python-version }}"

  rust-sdk:
    name: Rust SDK Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            sdk/rust/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Check Rust formatting
        run: cd sdk/rust && cargo fmt -- --check
      
      - name: Run Clippy
        run: cd sdk/rust && cargo clippy -- -D warnings
      
      - name: Build Rust SDK
        run: cd sdk/rust && cargo build --release
      
      - name: Run Rust SDK tests
        run: cd sdk/rust && cargo test --release
      
      - name: Generate coverage report
        run: |
          cd sdk/rust
          cargo install cargo-tarpaulin || true
          cargo tarpaulin --out Xml --output-dir coverage
      
      - name: Upload Rust test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-test-results
          path: sdk/rust/target/release/
      
      - name: Upload Rust coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-report
          path: sdk/rust/coverage/
      
      - name: Check test results
        run: echo "✅ Rust SDK tests completed"

  go-sdk:
    name: Go SDK Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: sdk/go/go.sum

      - name: Download Go dependencies
        run: cd sdk/go && go mod download

      - name: Build Go SDK
        run: cd sdk/go && go build ./...

      - name: Run Go SDK tests
        run: cd sdk/go && go test ./... -v

      - name: Upload Go test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-build-output
          path: sdk/go

      - name: Check test results
        run: echo "✅ Go SDK tests completed"

  typescript-sdk:
    name: TypeScript SDK Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install dependencies
        run: cd sdk/typescript && npm ci

      - name: Build TypeScript SDK
        run: cd sdk/typescript && npm run build

      - name: Run TypeScript SDK tests
        run: cd sdk/typescript && npm test -- --runInBand

      - name: Upload TypeScript build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-dist
          path: sdk/typescript/dist

      - name: Check test results
        run: echo "✅ TypeScript SDK tests completed"

  scala-sdk:
    name: Scala SDK Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Build Scala SDK
        run: cd sdk/scala && sbt compile

      - name: Run Scala SDK tests
        run: cd sdk/scala && sbt test

      - name: Upload Scala test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scala-test-reports
          path: sdk/scala/target

      - name: Check test results
        run: echo "✅ Scala SDK tests completed"

  csharp-sdk:
    name: C# SDK Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore C# SDK dependencies
        run: cd sdk/csharp && dotnet restore Substrait.Compliance.csproj

      - name: Build C# SDK
        run: cd sdk/csharp && dotnet build Substrait.Compliance.csproj --configuration Release --no-restore

      - name: Run C# SDK tests
        run: cd sdk/csharp && dotnet test Substrait.Compliance.csproj --configuration Release --no-build

      - name: Upload C# build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: csharp-build-output
          path: sdk/csharp/bin

      - name: Check test results
        run: echo "✅ C# SDK tests completed"

  publish-java-packages:
    name: Publish Java SDK to GitHub Packages
    runs-on: ubuntu-latest
    needs: java-sdk
    # Only publish on direct pushes to main — not on pull requests.
    # GITHUB_TOKEN is auto-injected by Actions; no extra secrets required.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x sdk/java/gradlew

      - name: Publish to GitHub Packages
        run: cd sdk/java && ./gradlew publishMavenPublicationToGitHubPackagesRepository --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Report published coordinates
        run: |
          VERSION=$(grep "^version" sdk/java/build.gradle | sed "s/version = '//;s/'//")
          echo "## ✅ Java SDK published to GitHub Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Coordinates:** \`io.substrait:substrait-compliance:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository URL:** https://maven.pkg.github.com/IBM/substrait-compliance" >> $GITHUB_STEP_SUMMARY

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [java-sdk, python-sdk, rust-sdk, go-sdk, typescript-sdk, scala-sdk, csharp-sdk]
    if: always()
    
    steps:
      - name: Check all SDK tests
        run: |
          echo "## SDK Build & Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| SDK | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Java | ${{ needs.java-sdk.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python | ${{ needs.python-sdk.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust | ${{ needs.rust-sdk.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Go | ${{ needs.go-sdk.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ${{ needs.typescript-sdk.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scala | ${{ needs.scala-sdk.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| C# | ${{ needs.csharp-sdk.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.java-sdk.result }}" != "success" ] || \
             [ "${{ needs.python-sdk.result }}" != "success" ] || \
             [ "${{ needs.rust-sdk.result }}" != "success" ] || \
             [ "${{ needs.go-sdk.result }}" != "success" ] || \
             [ "${{ needs.typescript-sdk.result }}" != "success" ] || \
             [ "${{ needs.scala-sdk.result }}" != "success" ] || \
             [ "${{ needs.csharp-sdk.result }}" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **Some SDK tests failed. Please review the logs above.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **All SDK tests passed successfully!**" >> $GITHUB_STEP_SUMMARY
          fi

