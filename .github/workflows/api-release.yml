name: API Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission
        run: chmod +x api/gradlew
      
      - name: Build release artifacts
        run: |
          cd api
          ./gradlew bootJar --no-daemon
      
      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: ".github/changelog-config.json"
          failOnError: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create release notes
        run: |
          cat > release-notes.md << 'EOF'
          ## What's Changed
          
          ${{ steps.changelog.outputs.changelog }}
          
          ## Installation
          
          ### Docker/Podman
          ```bash
          docker pull ghcr.io/${{ github.repository }}/substrait-compliance-api:${{ github.ref_name }}
          ```
          
          ### JAR
          Download the JAR file from the assets below and run:
          ```bash
          java -jar substrait-compliance-api-${{ github.ref_name }}.jar
          ```
          
          ## Documentation
          - [Deployment Guide](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/api/DEPLOYMENT.md)
          - [API Usage Guide](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/api/API_USAGE.md)
          - [API Documentation](https://api.substrait.io/swagger-ui.html)
          
          ## Full Changelog
          **Full Changelog**: https://github.com/${{ github.repository }}/compare/...
          EOF
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            api/build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push release container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api/Containerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/substrait-compliance-api:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/substrait-compliance-api:latest
          labels: |
            org.opencontainers.image.title=Substrait Compliance API
            org.opencontainers.image.description=REST API for Substrait compliance testing
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
      
      - name: Summary
        run: |
          echo "✅ Release ${{ github.ref_name }} created successfully"
          echo "📦 Container image: ghcr.io/${{ github.repository }}/substrait-compliance-api:${{ github.ref_name }}"
          echo "📄 Release notes: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"

