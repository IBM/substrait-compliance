version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      actions-all:
        patterns: ["*"]

  # Gradle (API module)
  - package-ecosystem: "gradle"
    directory: "/api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      api-minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Majors that are deliberate migration projects, not routine bumps
      - dependency-name: "org.springframework.boot*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.flywaydb*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.testcontainers*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.junit*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.google.protobuf*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "gradle*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "io.github.bucket4j*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.github.vladimir-bukhtoyarov*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "io.jsonwebtoken*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # Gradle (SDK module)
  - package-ecosystem: "gradle"
    directory: "/sdk/java"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      sdk-minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "org.junit*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.google.protobuf*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "io.substrait*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "gradle*"
        update-types: ["version-update:semver-major"]
