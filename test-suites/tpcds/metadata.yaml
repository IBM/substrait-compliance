name: "tpcds"
version: "1.0.0"
description: "TPC-DS Benchmark Compliance Suite - Decision Support Benchmark at Scale Factor 0.01"
scale_factor: 0.01
total_rows: 288000

# TPC-DS is a decision support benchmark with 99 queries
# This initial implementation includes the first 5 queries as a foundation
# Additional queries will be added incrementally

testCases:
  - id: "q01"
    description: "Customer Returns Analysis - Find customers with high return rates"
    complexity: "MEDIUM"
    planBinary: "plans/q01.bin"
    planJson: "plans/q01.json"
    inputTables:
      - name: "store_returns"
        file: "data/store_returns.csv"
        rows: 28795
      - name: "date_dim"
        file: "data/date_dim.csv"
        rows: 73049
      - name: "store"
        file: "data/store.csv"
        rows: 12
      - name: "customer"
        file: "data/customer.csv"
        rows: 10000
    expectedOutput: "expected/q01.csv"
    features:
      - "aggregation"
      - "joins"
      - "filtering"
      - "grouping"
    
  - id: "q02"
    description: "Web Sales Analysis - Analyze web sales patterns by date"
    complexity: "COMPLEX"
    planBinary: "plans/q02.bin"
    planJson: "plans/q02.json"
    inputTables:
      - name: "web_sales"
        file: "data/web_sales.csv"
        rows: 71997
      - name: "date_dim"
        file: "data/date_dim.csv"
        rows: 73049
      - name: "catalog_sales"
        file: "data/catalog_sales.csv"
        rows: 143997
    expectedOutput: "expected/q02.csv"
    features:
      - "subqueries"
      - "correlation"
      - "date_operations"
      - "aggregation"
    
  - id: "q03"
    description: "Item Sales by Brand - Analyze sales by item brand and category"
    complexity: "MEDIUM"
    planBinary: "plans/q03.bin"
    planJson: "plans/q03.json"
    inputTables:
      - name: "store_sales"
        file: "data/store_sales.csv"
        rows: 287997
      - name: "date_dim"
        file: "data/date_dim.csv"
        rows: 73049
      - name: "item"
        file: "data/item.csv"
        rows: 18000
    expectedOutput: "expected/q03.csv"
    features:
      - "joins"
      - "aggregation"
      - "grouping"
      - "filtering"
    
  - id: "q04"
    description: "Customer Profitability Analysis - Identify most profitable customers"
    complexity: "VERY_COMPLEX"
    planBinary: "plans/q04.bin"
    planJson: "plans/q04.json"
    inputTables:
      - name: "customer"
        file: "data/customer.csv"
        rows: 10000
      - name: "store_sales"
        file: "data/store_sales.csv"
        rows: 287997
      - name: "catalog_sales"
        file: "data/catalog_sales.csv"
        rows: 143997
      - name: "web_sales"
        file: "data/web_sales.csv"
        rows: 71997
      - name: "date_dim"
        file: "data/date_dim.csv"
        rows: 73049
    expectedOutput: "expected/q04.csv"
    features:
      - "multi_channel_analysis"
      - "complex_joins"
      - "window_functions"
      - "ranking"
    
  - id: "q05"
    description: "Sales Channel Comparison - Compare sales across different channels"
    complexity: "COMPLEX"
    planBinary: "plans/q05.bin"
    planJson: "plans/q05.json"
    inputTables:
      - name: "store_sales"
        file: "data/store_sales.csv"
        rows: 287997
      - name: "store_returns"
        file: "data/store_returns.csv"
        rows: 28795
      - name: "catalog_sales"
        file: "data/catalog_sales.csv"
        rows: 143997
      - name: "catalog_returns"
        file: "data/catalog_returns.csv"
        rows: 14416
      - name: "web_sales"
        file: "data/web_sales.csv"
        rows: 71997
      - name: "web_returns"
        file: "data/web_returns.csv"
        rows: 7197
      - name: "date_dim"
        file: "data/date_dim.csv"
        rows: 73049
    expectedOutput: "expected/q05.csv"
    features:
      - "union_operations"
      - "aggregation"
      - "channel_analysis"
      - "returns_analysis"

# TPC-DS Schema Information
schema:
  tables:
    - name: "store_sales"
      description: "Sales transactions at physical stores"
      row_count: 287997
      columns:
        - {name: "ss_sold_date_sk", type: "integer"}
        - {name: "ss_sold_time_sk", type: "integer"}
        - {name: "ss_item_sk", type: "integer"}
        - {name: "ss_customer_sk", type: "integer"}
        - {name: "ss_store_sk", type: "integer"}
        - {name: "ss_quantity", type: "integer"}
        - {name: "ss_sales_price", type: "decimal(7,2)"}
        - {name: "ss_ext_sales_price", type: "decimal(7,2)"}
        
    - name: "store_returns"
      description: "Product returns at physical stores"
      row_count: 28795
      columns:
        - {name: "sr_returned_date_sk", type: "integer"}
        - {name: "sr_return_time_sk", type: "integer"}
        - {name: "sr_item_sk", type: "integer"}
        - {name: "sr_customer_sk", type: "integer"}
        - {name: "sr_store_sk", type: "integer"}
        - {name: "sr_return_quantity", type: "integer"}
        - {name: "sr_return_amt", type: "decimal(7,2)"}
        
    - name: "catalog_sales"
      description: "Sales transactions via catalog"
      row_count: 143997
      columns:
        - {name: "cs_sold_date_sk", type: "integer"}
        - {name: "cs_sold_time_sk", type: "integer"}
        - {name: "cs_item_sk", type: "integer"}
        - {name: "cs_bill_customer_sk", type: "integer"}
        - {name: "cs_quantity", type: "integer"}
        - {name: "cs_sales_price", type: "decimal(7,2)"}
        - {name: "cs_ext_sales_price", type: "decimal(7,2)"}
        
    - name: "catalog_returns"
      description: "Product returns via catalog"
      row_count: 14416
      columns:
        - {name: "cr_returned_date_sk", type: "integer"}
        - {name: "cr_item_sk", type: "integer"}
        - {name: "cr_refunded_customer_sk", type: "integer"}
        - {name: "cr_return_quantity", type: "integer"}
        - {name: "cr_return_amount", type: "decimal(7,2)"}
        
    - name: "web_sales"
      description: "Sales transactions via web"
      row_count: 71997
      columns:
        - {name: "ws_sold_date_sk", type: "integer"}
        - {name: "ws_sold_time_sk", type: "integer"}
        - {name: "ws_item_sk", type: "integer"}
        - {name: "ws_bill_customer_sk", type: "integer"}
        - {name: "ws_quantity", type: "integer"}
        - {name: "ws_sales_price", type: "decimal(7,2)"}
        - {name: "ws_ext_sales_price", type: "decimal(7,2)"}
        
    - name: "web_returns"
      description: "Product returns via web"
      row_count: 7197
      columns:
        - {name: "wr_returned_date_sk", type: "integer"}
        - {name: "wr_item_sk", type: "integer"}
        - {name: "wr_refunded_customer_sk", type: "integer"}
        - {name: "wr_return_quantity", type: "integer"}
        - {name: "wr_return_amt", type: "decimal(7,2)"}
        
    - name: "date_dim"
      description: "Date dimension table"
      row_count: 73049
      columns:
        - {name: "d_date_sk", type: "integer"}
        - {name: "d_date_id", type: "char(16)"}
        - {name: "d_date", type: "date"}
        - {name: "d_month_seq", type: "integer"}
        - {name: "d_week_seq", type: "integer"}
        - {name: "d_quarter_seq", type: "integer"}
        - {name: "d_year", type: "integer"}
        - {name: "d_dow", type: "integer"}
        - {name: "d_moy", type: "integer"}
        - {name: "d_dom", type: "integer"}
        - {name: "d_qoy", type: "integer"}
        
    - name: "customer"
      description: "Customer dimension table"
      row_count: 10000
      columns:
        - {name: "c_customer_sk", type: "integer"}
        - {name: "c_customer_id", type: "char(16)"}
        - {name: "c_current_addr_sk", type: "integer"}
        - {name: "c_first_name", type: "char(20)"}
        - {name: "c_last_name", type: "char(30)"}
        - {name: "c_birth_year", type: "integer"}
        
    - name: "item"
      description: "Item dimension table"
      row_count: 18000
      columns:
        - {name: "i_item_sk", type: "integer"}
        - {name: "i_item_id", type: "char(16)"}
        - {name: "i_item_desc", type: "varchar(200)"}
        - {name: "i_brand", type: "char(50)"}
        - {name: "i_category", type: "char(50)"}
        - {name: "i_current_price", type: "decimal(7,2)"}
        
    - name: "store"
      description: "Store dimension table"
      row_count: 12
      columns:
        - {name: "s_store_sk", type: "integer"}
        - {name: "s_store_id", type: "char(16)"}
        - {name: "s_store_name", type: "varchar(50)"}
        - {name: "s_number_employees", type: "integer"}

# Complexity Classification
complexity_levels:
  SIMPLE: "Single table queries with basic aggregation"
  MEDIUM: "Multi-table joins with aggregation and filtering"
  COMPLEX: "Complex joins, subqueries, and advanced aggregation"
  VERY_COMPLEX: "Multi-channel analysis, window functions, and complex business logic"

# Notes
notes:
  - "TPC-DS is more complex than TPC-H with 99 queries vs 22"
  - "Focuses on decision support and business intelligence scenarios"
  - "Includes multi-channel retail analysis (store, catalog, web)"
  - "This initial release includes 5 representative queries"
  - "Full 99-query suite will be added in future releases"
  - "Data generation requires TPC-DS tools from tpc.org"
  - "Scale factor 0.01 is suitable for testing and development"

