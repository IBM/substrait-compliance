spring:
  datasource:
    # URL/credentials will be overridden by TestContainers
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      spring.jpa.hibernate.ddl-auto: none
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        temp:
          use_jdbc_metadata_defaults: false
        hbm2ddl:
          auto: none
    show-sql: false
  
  flyway:
    enabled: true
    locations: classpath:db/migration
  
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=1m

jwt:
  secret: test-secret-key-for-testing-purposes-only-min-256-bits
  expiration: 3600000

rate-limit:
  enabled: true
  default-limit: 100
  refill-duration-minutes: 1

logging:
  level:
    io.substrait: DEBUG
    org.springframework.security: DEBUG

